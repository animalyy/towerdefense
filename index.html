<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>WORLD TD ATLAS - Solid Integrity Edition</title>
<style>
:root{
  --bg:#f4f8ff; --panel:#ffffff; --panel2:#f7fbff; --line:#cfe0f5; --text:#203149; --sub:#58718e;
  --gold:#e6b13f; --bad:#d95f5f; --ok:#53b780; --ice:#74cfff; --accent:#5d8cff;
  --font-main: "Inter", "Hiragino Sans", sans-serif;
  --font-mono: "JetBrains Mono", monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:linear-gradient(180deg,#f8fbff 0%,#eef6ff 52%,#e7f2ff 100%);color:var(--text);font-family:var(--font-main);height:100%;overflow:hidden}
#app{display:grid;grid-template-rows:auto auto 1fr auto;gap:10px;height:100%;padding:12px 12px calc(12px + env(safe-area-inset-bottom))}
.card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 32px rgba(104,144,188,.16);overflow:hidden}
.top{padding:14px 16px; position:relative;}
.title{font-size:24px;font-weight:900;letter-spacing:.08em;color:#1a3046; background: linear-gradient(90deg, #23405d, #5d8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
.sub{color:var(--sub);font-size:12px;line-height:1.6;margin-top:4px; font-weight:500}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:10px}
.stat{padding:10px;border-radius:14px;background:linear-gradient(180deg,#f9fcff,#eef5ff);border:1px solid #d9e7f8;text-align:center;}
.stat .k{font-size:11px;color:var(--sub);font-weight:700} 
.stat .v{font-size:20px;font-weight:800;margin-top:4px;color:#204162; font-family:var(--font-mono)}
.main{display:grid;grid-template-columns:1fr 310px;gap:10px;min-height:0}
.left{display:grid;grid-template-rows:1fr auto;gap:10px;min-height:0}
#wrap{position:relative;min-height:0; transition: box-shadow 0.3s; touch-action: none;}
#game{width:100%;height:100%;display:block;border-radius:18px;background:#dff0ff}
#fx{position:absolute;inset:0;pointer-events:none;border-radius:18px;overflow:hidden}
#flash{position:absolute;inset:0;opacity:0;background:#fff; pointer-events:none; transition: opacity 0.3s;}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;color:#fff;font-size:42px;font-weight:900;z-index:100;flex-direction:column;text-align:center;padding:20px;backdrop-filter:blur(6px); animation: fadeIn 0.5s ease;}
@keyframes fadeIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
.comboFloat{position:absolute;left:50%;top:20px;transform:translateX(-50%) translateY(-6px);padding:12px 24px;border-radius:999px;background:rgba(255,255,255,0.95);border:2px solid #e7c979;color:#7a5614;font-size:16px;font-weight:900;opacity:0;pointer-events:none;box-shadow:0 10px 30px rgba(167,122,31,0.25);transition:.3s}
#side{padding:12px;display:grid;grid-template-rows:auto auto auto auto 1fr;gap:10px;min-height:0; background: #fdfdfe;}
.section{padding:12px;border-radius:16px;background:rgba(255,255,255,0.5);border:1px solid #e2edf9}
.section h3{margin:0 0 10px 0;font-size:13px;color:#2f5277; font-weight:800; text-transform: uppercase}
#stageList{display:grid;grid-template-columns:1fr;gap:8px;max-height:160px;overflow:auto;padding-right:4px}
.stageBtn,.towerBtn,.ctlBtn,.miniBtn{width:100%;border:1px solid #b7cff0;background:linear-gradient(180deg,#ffffff,#edf5ff);color:#244462;border-radius:12px;padding:10px;font-weight:700;font-size:12px;text-align:left;cursor:pointer;box-shadow:0 4px 10px rgba(126,161,199,.12); transition: 0.2s;}
.stageBtn small,.towerBtn small{display:block;color:#67819f;font-weight:500;margin-top:4px;line-height:1.4; font-size:10px}
.stageBtn.active,.towerBtn.active{outline:2px solid var(--gold);border-color:#d7b468;background:linear-gradient(180deg,#fffaf0,#f7edd0);}
.miniBtn{padding:8px;font-size:11px;text-align:center;border-color:#d0e1f7}
.miniBtn:not(:disabled):hover{background:var(--bg);border-color:var(--accent); transform: translateY(-1px);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
#log{font-size:12px;line-height:1.6;color:#32506f;overflow:auto;white-space:pre-line;}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:12px}
.ctlBtn{font-size:14px;text-align:center; padding:12px}
.ctlBtn:not(:disabled):active{transform: scale(0.96);}
.ctlBtn:disabled{opacity: 0.5; cursor: not-allowed; filter: grayscale(1);}
.waveTag{display:inline-block;padding:4px 10px;border-radius:899px;background:#eef5ff;border:1px solid #d4e4f6;color:#4f6d8f;font-size:11px;margin:0 6px 6px 0; font-weight:700}
.od-active #wrap { animation: od-pulse 0.5s infinite alternate; border: 2px solid #ff6b6b; }
@keyframes od-pulse { from { box-shadow: 0 0 10px rgba(255,107,107,0.3); } to { box-shadow: 0 0 30px rgba(255,107,107,0.8); } }
@media (max-width:920px){ .main{grid-template-columns:1fr;grid-template-rows:minmax(320px,45vh) auto} }
</style>
</head>
<body>
<div id="app">
  <div class="top card"><div class="title">WORLD TD ATLAS</div><div class="sub">作戦司令部：論理整合・UI統一版</div></div>
  <div class="stats card">
    <div class="stat"><div class="k">資金</div><div class="v" id="gold">0</div></div>
    <div class="stat"><div class="k">拠点</div><div class="v" id="life">0</div></div>
    <div class="stat"><div class="k">Wave</div><div class="v" id="wave">0/0</div></div>
    <div class="stat"><div class="k">残敵</div><div class="v" id="enemyCount">0</div></div>
    <div class="stat"><div class="k">連鎖</div><div class="v" id="combo">x1.0</div></div>
    <div class="stat"><div class="k">選択</div><div class="v" id="selected">なし</div></div>
  </div>
  <div class="main">
    <div class="left">
      <div id="wrap" class="card">
        <canvas id="game"></canvas>
        <div id="fx"><div id="flash"></div><div id="comboFx" class="comboFloat"></div></div>
        <div id="overlay"></div>
      </div>
      <div class="controls card">
        <button class="ctlBtn" id="startBtn">作戦開始</button>
        <button class="ctlBtn" id="nextBtn" disabled>次Wave</button>
        <button class="ctlBtn" id="resetBtn">再読込</button>
      </div>
    </div>
    <div id="side" class="card">
      <div class="section"><h3>作戦区域</h3><div id="stageList"></div></div>
      <div class="section"><h3>軍備選択</h3><div class="grid2" id="towerList"></div></div>
      <div class="section"><h3>戦術情報</h3><div id="stageInfo" style="font-size:11px;color:var(--sub);margin-bottom:8px"></div><div id="wavePreview"></div></div>
      <div class="section"><h3>配備ユニット</h3>
        <div id="towerDetail" style="font-size:12px;min-height:36px"><b>待機中</b></div>
        <div class="selBtns"><button class="miniBtn" id="upgradeBtn" disabled>強化</button><button class="miniBtn" id="sellBtn" disabled>撤去</button></div>
      </div>
      <div class="section" style="min-height:0;display:grid;grid-template-rows:auto 1fr"><h3>戦術ログ</h3><div id="log"></div></div>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game'), ctx = canvas.getContext('2d'), wrap = document.getElementById('wrap');
  const INTERNAL_W = 960, INTERNAL_H = 540;

  const TOWERS = {
    bolt:{name:'ボルト塔', cost:90, range:105, rate:0.65, damage:16, color:'#89a8ff', desc:'精密単体射撃。'},
    burst:{name:'バースト砲', cost:140, range:92, rate:1.25, damage:28, splash:45, color:'#ff9a6b', desc:'範囲制圧用。'},
    frost:{name:'フロスト塔', cost:120, range:90, rate:1.0, damage:8, slow:0.52, slowTime:1.5, color:'#7ed6ff', desc:'冷却。連鎖の起点。'},
    arc:{name:'アーク塔', cost:170, range:118, rate:1.4, damage:14, chain:3, color:'#d19cff', desc:'感電連鎖。'},
    prism:{name:'プリズム塔', cost:210, range:112, rate:1.5, damage:24, color:'#7dffb4', desc:'凍結敵を破砕(2.2倍)'}
  };

  const STAGES = [
    {id:'lanes', name:'1. 三列芝庭', short:'レーン型', info:'一直線に進む敵を各列で迎え撃て。', pads:[{x:190,y:135},{x:310,y:135},{x:570,y:135},{x:190,y:270},{x:430,y:270},{x:690,y:270},{x:190,y:405},{x:570,y:405},{x:690,y:405}], paths:[[[0,135],[930,135]],[[0,270],[930,270]],[[0,405],[930,405]]], waves:[['runner','runner','swarm'],['runner','brute','swarm'],['ghost','brute','titan']]},
    {id:'choke', name:'2. 山峡関門', short:'集中型', info:'狭い通路に火力を集中させよ。', pads:[{x:140,y:120},{x:260,y:190},{x:500,y:190},{x:740,y:190},{x:710,y:380},{x:410,y:380}], paths:[[[0,80],[130,80],[130,210],[735,210],[735,390],[930,390]]], waves:[['runner','runner'],['brute','swarm','brute'],['titan','ghost','runner']]},
    {id:'loop', name:'3. 螺旋回廊', short:'周回型', info:'長い経路を活かして効率的に削れ。', pads:[{x:470,y:270},{x:370,y:270},{x:570,y:270},{x:470,y:170},{x:470,y:370}], paths:[[[0,270],[120,270],[120,120],[820,120],[820,420],[220,420],[220,200],[720,200],[720,340],[320,340],[320,270],[930,270]]], waves:[['runner','swarm','runner'],['ghost','ghost','brute'],['titan','brute']]}
  ];

  const ENEMY_TYPES = {
    runner:{name:'ランナー', hp:45, speed:85, reward:12, color:'#ffd071'},
    brute:{name:'ブルート', hp:140, speed:40, reward:25, color:'#ff7f7f'},
    swarm:{name:'スウォーム', hp:25, speed:95, reward:8, color:'#f4f4f4'},
    ghost:{name:'スペクター', hp:70, speed:72, reward:18, color:'#8fd4ff'},
    titan:{name:'タイタン', hp:450, speed:35, reward:100, color:'#c38dff'}
  };

  let state = null, towerType = 'bolt', lastTime = 0;

  function resize() {
    const rect = wrap.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
    ctx.setTransform(1,0,0,1,0,0); ctx.scale(canvas.width / INTERNAL_W, canvas.height / INTERNAL_H);
  }
  window.addEventListener('resize', resize); resize();

  function loadStage(id) {
    const s = STAGES.find(x => x.id === id) || STAGES[0];
    state = {
      stageId: s.id, stage: JSON.parse(JSON.stringify(s)), gold: 350, life: 20, waveIndex: 0,
      enemies: [], projectiles: [], towers: [], particles: [], queue: [],
      spawnTimer: 0, combo: 1, chainKills: 0, comboTimer: 0, overdriveTime: 0, started: false, selId: null, gameOver: false
    };

    towerType = 'bolt';

    document.getElementById('log').textContent = '';
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('startBtn').disabled = false;
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('stageInfo').textContent = s.info || '';
    [...document.getElementById('stageList').children].forEach((b,i)=>b.classList.toggle('active', STAGES[i].id===id));
    refreshTowerSelection();
    renderWavePreview(); updateHud(); pushLog(`${s.name} 展開完了。`);
  }

  function refreshTowerSelection() {
    [...document.getElementById('towerList').children].forEach((btn,i)=>btn.classList.toggle('active', Object.keys(TOWERS)[i]===towerType));
  }

  function renderWavePreview() {
    const next = state.stage.waves[state.waveIndex], el = document.getElementById('wavePreview');
    if(!next){ el.innerHTML = '<div class="waveTag" style="background:#ffdada">全エリア制圧</div>'; return; }
    el.innerHTML = '<div style="font-size:11px;font-weight:700;margin:8px 0 4px">次Wave:</div>' + next.map(t => `<span class="waveTag">${ENEMY_TYPES[t].name}</span>`).join('');
  }

  function spawnWave() {
    if (state.waveIndex >= state.stage.waves.length || state.started || state.gameOver) return;
    state.queue = state.stage.waves[state.waveIndex].map((type, i) => ({ type, pathIndex: i % state.stage.paths.length, delay: 0.8 }));
    state.waveIndex++; state.started = true; state.spawnTimer = 0;
    document.getElementById('startBtn').disabled = true; document.getElementById('nextBtn').disabled = true;
    flash(); updateHud();
  }

  function killEnemy(e) {
    if (!e.alive || e.hp > 0) return;
    e.alive = false; state.chainKills++;
    state.combo = Math.min(6, 1 + state.chainKills * 0.2);
    state.comboTimer = 3.5;
    state.gold += Math.floor(e.reward * state.combo);
    if(state.chainKills % 5 === 0) { state.overdriveTime = 5; flash(); pushLog('オーバーライブ発動！'); }
    comboPopup(`${state.chainKills}連鎖 x${state.combo.toFixed(1)}`);
    for(let i=0; i<8; i++) {
      state.particles.push({ 
        x: e.x, y: e.y, r: Math.random()*4+2, 
        vx: (Math.random()-0.5)*150, vy: (Math.random()-0.5)*150,
        life: 0.5, color: e.color || '#fff' 
      });
    }
  }

  function showOverlay(msg, color) {
    state.gameOver = true;
    updateHud();
    const o = document.getElementById('overlay');
    o.innerHTML = `<span style="text-shadow: 0 0 20px ${color}">${msg}</span><br><button class="ctlBtn" style="margin-top:20px;width:160px;background:#fff;color:#000" id="retryBtn">再挑戦</button>`;
    o.style.color = color; o.style.display = 'flex';
    document.getElementById('retryBtn').onclick = () => loadStage(state.stageId);
  }

  function update(dt) {
    if (!state || state.gameOver) return;
    if (state.overdriveTime > 0) state.overdriveTime -= dt;

    if (state.comboTimer > 0) {
      state.comboTimer -= dt;
      if (state.comboTimer <= 0) { state.combo = 1; state.chainKills = 0; pushLog('連鎖途絶。'); }
    }

    if (state.started) {
      if (state.queue.length > 0) {
        state.spawnTimer += dt;
        while (state.queue.length > 0 && state.spawnTimer >= state.queue[0].delay) {
          const q = state.queue.shift(), base = ENEMY_TYPES[q.type], path = state.stage.paths[q.pathIndex];
          state.enemies.push({ ...base, maxHp: base.hp, hp: base.hp, progress: 0, pathIndex: q.pathIndex, x: path[0][0], y: path[0][1], alive: true, slowTime: 0, slowMul: 1, chill: false });
          state.spawnTimer -= q.delay; 
        }
      }

      for (let e of state.enemies) {
        if (!e.alive) continue;
        if (e.slowTime > 0) { e.slowTime -= dt; if (e.slowTime <= 0) e.slowMul = 1; }
        e.progress += e.speed * e.slowMul * dt;
        const path = state.stage.paths[e.pathIndex];
        let d = 0, moved = false;
        for (let i = 0; i < path.length - 1; i++) {
          const seg = Math.hypot(path[i+1][0]-path[i][0], path[i+1][1]-path[i][1]);
          if (e.progress <= d + seg) {
            const t = (e.progress - d) / seg; e.x = path[i][0] + (path[i+1][0]-path[i][0]) * t; e.y = path[i][1] + (path[i+1][1]-path[i][1]) * t;
            moved = true; break;
          } d += seg;
        }
        if (!moved) {
          e.alive = false; state.life--; pushLog('拠点侵入を許しました！');
          if (state.life <= 0) { state.life = 0; showOverlay('作戦失敗', '#ff4d4d'); return; }
        }
      }
      state.enemies = state.enemies.filter(e => e.alive);

      for (let t of state.towers) {
        t.cd = (t.cd || 0) - dt;
        if (t.cd <= 0) {
          const def = TOWERS[t.type], range = def.range * (1 + (t.level-1)*0.1);
          const target = state.enemies.find(e => e.alive && Math.hypot(t.x-e.x, t.y-e.y) <= range);
          if (target) {
            let dmg = def.damage * (1 + (t.level-1)*0.4) * state.combo;
            if (t.type === 'prism' && target.chill) dmg *= 2.2;
            target.hp -= dmg;
            if (t.type === 'frost') { target.slowMul = def.slow; target.slowTime = def.slowTime; target.chill = true; }
            if (t.type === 'arc') {
              state.enemies.forEach(e => { 
                if(e !== target && e.alive && Math.hypot(target.x-e.x, target.y-e.y) < 70) {
                  e.hp -= dmg*0.6; if (e.hp <= 0) killEnemy(e);
                  state.projectiles.push({ x: target.x, y: target.y, tx: e.x, ty: e.y, life: 0.15, color: '#d19cff' });
                }
              });
            }
            if (target.hp <= 0) killEnemy(target);
            t.cd = def.rate * (state.overdriveTime > 0 ? 0.6 : 1);
            state.projectiles.push({ x: t.x, y: t.y, tx: target.x, ty: target.y, life: 0.12, color: def.color, wide: t.type==='burst' });
          }
        }
      }

      state.enemies = state.enemies.filter(e => e.alive);

      if (state.queue.length === 0 && state.enemies.length === 0) {
        state.started = false;
        if (state.waveIndex >= state.stage.waves.length) {
          showOverlay('全エリア制圧', '#00ffcc'); return;
        } else {
          const interest = Math.floor(state.gold * 0.05); state.gold += interest;
          pushLog(`防衛完了。利子 +G${interest}`);
          document.getElementById('nextBtn').disabled = false;
          document.getElementById('startBtn').disabled = true;
          renderWavePreview();
        }
      }
    }
    state.projectiles.forEach(p => p.life -= dt); state.projectiles = state.projectiles.filter(p => p.life > 0);
    state.particles.forEach(p => { 
      p.life -= dt; p.x += (p.vx||0)*dt; p.y += (p.vy||0)*dt; p.r *= 0.96; 
    });
    state.particles = state.particles.filter(p => p.life > 0);
    updateHud();
  }

  function draw() {
    ctx.clearRect(0, 0, INTERNAL_W, INTERNAL_H); if (!state) return;
    ctx.fillStyle = '#f8fbff'; ctx.fillRect(0,0,INTERNAL_W,INTERNAL_H);
    state.stage.paths.forEach(p => {
      ctx.lineWidth = 28; ctx.strokeStyle = 'rgba(103,165,228,0.15)'; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath(); ctx.moveTo(p[0][0], p[0][1]); p.slice(1).forEach(v => ctx.lineTo(v[0], v[1])); ctx.stroke();
    });
    state.stage.pads.forEach((p, i) => {
      ctx.fillStyle = state.towers.some(t=>t.padIdx===i) ? 'rgba(0,0,0,0.05)' : 'rgba(93,140,255,0.08)';
      ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, Math.PI*2); ctx.fill();
    });
    state.towers.forEach(t => {
      const shake = state.overdriveTime > 0 ? (Math.random()-0.5)*4 : 0; ctx.save(); ctx.translate(t.x+shake, t.y+shake);
      ctx.fillStyle = TOWERS[t.type].color; ctx.shadowBlur = state.overdriveTime > 0 ? 20 : 10; ctx.shadowColor = TOWERS[t.type].color;
      ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
      if (t.id === state.selId) { ctx.strokeStyle = '#5d8cff'; ctx.lineWidth = 3; ctx.setLineDash([4,2]); ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.stroke(); }
      ctx.restore();
    });
    state.enemies.forEach(e => {
      if(!e.alive) return;
      ctx.save(); ctx.shadowBlur = 8; ctx.shadowColor = e.color;
      ctx.fillStyle = e.chill ? '#7ed6ff' : e.color; ctx.beginPath(); ctx.arc(e.x, e.y, 10, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(e.x-12, e.y-18, 24, 3);
      ctx.fillStyle = '#7ee09e'; ctx.fillRect(e.x-12, e.y-18, Math.max(0, 24*(e.hp/e.maxHp)), 3);
    });
    state.projectiles.forEach(p => { 
      ctx.strokeStyle = p.color; ctx.lineWidth = p.wide ? 6 : 3; ctx.globalAlpha = p.life*8;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.tx, p.ty); ctx.stroke(); ctx.globalAlpha = 1; 
    });
    state.particles.forEach(p => { 
      ctx.globalAlpha = p.life*2; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; 
    });
  }

  canvas.onpointerdown = ev => {
    if (state.gameOver) return;
    const rect = canvas.getBoundingClientRect();
    const x = (ev.clientX - rect.left) * (INTERNAL_W / rect.width), y = (ev.clientY - rect.top) * (INTERNAL_H / rect.height);
    const t = state.towers.find(t => Math.hypot(t.x-x, t.y-y) < 25);
    if (t) state.selId = t.id;
    else {
      const pIdx = state.stage.pads.findIndex(p => Math.hypot(p.x-x, p.y-y) < 25);
      if (pIdx !== -1 && !state.towers.some(t => t.padIdx === pIdx)) {
        const def = TOWERS[towerType];
        if (state.gold >= def.cost) {
          state.gold -= def.cost; const nt = { id:Math.random(), padIdx:pIdx, x:state.stage.pads[pIdx].x, y:state.stage.pads[pIdx].y, type:towerType, level:1 };
          state.towers.push(nt); state.selId = nt.id; pushLog(`${def.name} 配備。`);
        } else pushLog('資金不足。');
      } else state.selId = null;
    }
    updateHud();
  };

  function updateHud() {
    if (!state) return;
    document.getElementById('gold').textContent = state.gold; document.getElementById('life').textContent = state.life;
    document.getElementById('wave').textContent = `${state.waveIndex}/${state.stage.waves.length}`;
    document.getElementById('enemyCount').textContent = state.enemies.filter(e => e.alive).length + state.queue.length;
    document.getElementById('combo').textContent = `x${state.combo.toFixed(1)}`;
    wrap.className = state.overdriveTime > 0 ? 'card od-active' : 'card';
    const sel = state.towers.find(t => t.id === state.selId);
    if(sel){
      const def = TOWERS[sel.type], upCost = sel.level < 3 ? Math.floor(def.cost * (0.8 + sel.level * 0.5)) : null;
      document.getElementById('towerDetail').innerHTML = `<b>${def.name} レベル${sel.level}</b><br>${upCost ? '強化費用: G'+upCost : '最大強化済み'}`;
      document.getElementById('upgradeBtn').disabled = !upCost || state.gold < upCost;
      document.getElementById('sellBtn').disabled = false; document.getElementById('selected').textContent = def.name;
    } else {
      document.getElementById('towerDetail').innerHTML = '<b>配備待機中</b>';
      document.getElementById('upgradeBtn').disabled = true; document.getElementById('sellBtn').disabled = true; document.getElementById('selected').textContent = 'なし';
    }
  }

  function pushLog(m) { 
    const l = document.getElementById('log'); l.textContent = m + '\n' + l.textContent; 
    const lines = l.textContent.split('\n'); if (lines.length > 100) l.textContent = lines.slice(0, 100).join('\n');
  }
  function flash() { const f = document.getElementById('flash'); f.style.opacity = '0.5'; setTimeout(()=>f.style.opacity='0', 250); }
  function comboPopup(t) { const c = document.getElementById('comboFx'); c.textContent = t; c.style.opacity = '1'; c.style.transform = 'translateX(-50%) translateY(0)'; setTimeout(()=>{c.style.opacity='0'; c.style.transform='translateX(-50%) translateY(-6px)'}, 800); }

  document.getElementById('startBtn').onclick = () => {
    if(!state.started && state.waveIndex === 0) { pushLog('作戦開始。'); spawnWave(); }
  };
  document.getElementById('nextBtn').onclick = () => {
    if(!state.started && state.waveIndex > 0) { pushLog(`第 ${state.waveIndex + 1} 波 迎撃開始。`); spawnWave(); }
  };
  document.getElementById('resetBtn').onclick = () => loadStage(state.stageId);
  document.getElementById('upgradeBtn').onclick = () => {
    const sel = state.towers.find(t => t.id === state.selId); if(!sel) return;
    const cost = Math.floor(TOWERS[sel.type].cost * (0.8 + sel.level * 0.5));
    if(state.gold >= cost){ state.gold -= cost; sel.level++; flash(); pushLog('兵装を強化しました。'); updateHud(); }
  };
  document.getElementById('sellBtn').onclick = () => {
    const idx = state.towers.findIndex(t => t.id === state.selId); if(idx===-1) return;
    state.gold += Math.floor(TOWERS[state.towers[idx].type].cost * 0.6); state.towers.splice(idx,1); state.selId = null; updateHud();
  };

  STAGES.forEach(s => {
    const b = document.createElement('button'); b.className = 'stageBtn'; b.innerHTML = `${s.name}<small>${s.short}</small>`;
    b.onclick = () => loadStage(s.id); document.getElementById('stageList').appendChild(b);
  });
  Object.keys(TOWERS).forEach(k => {
    const b = document.createElement('button'); b.className = 'towerBtn'; b.innerHTML = `${TOWERS[k].name} G${TOWERS[k].cost}<small>${TOWERS[k].desc}</small>`;
    b.onclick = () => { towerType = k; refreshTowerSelection(); };
    document.getElementById('towerList').appendChild(b);
  });

  loadStage('lanes');
  function loop(t) { update(Math.min(0.033, (t - lastTime)/1000)); draw(); lastTime = t; requestAnimationFrame(loop); }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
