<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>WORLD TD ATLAS</title>
<style>
:root{
  --bg:#f4f8ff; --panel:#ffffff; --panel2:#f7fbff; --line:#cfe0f5; --text:#203149; --sub:#58718e;
  --gold:#e6b13f; --bad:#d95f5f; --ok:#53b780; --ice:#74cfff; --accent:#5d8cff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:linear-gradient(180deg,#f8fbff 0%,#eef6ff 52%,#e7f2ff 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;height:100%;overflow:hidden}
#app{display:grid;grid-template-rows:auto auto 1fr auto;gap:10px;height:100%;padding:12px 12px calc(12px + env(safe-area-inset-bottom))}
.card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 32px rgba(104,144,188,.16)}
.top{padding:14px 16px}
.title{font-size:22px;font-weight:800;letter-spacing:.04em;color:#23405d}
.sub{color:var(--sub);font-size:12px;line-height:1.6;margin-top:6px}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:10px}
.stat{padding:10px;border-radius:14px;background:linear-gradient(180deg,#f9fcff,#eef5ff);border:1px solid #d9e7f8;text-align:center}
.stat .k{font-size:11px;color:var(--sub)} .stat .v{font-size:18px;font-weight:800;margin-top:4px;color:#204162}
.main{display:grid;grid-template-columns:1fr 290px;gap:10px;min-height:0}
.left{display:grid;grid-template-rows:1fr auto;gap:10px;min-height:0}
#wrap{position:relative;min-height:0}
#game{width:100%;height:100%;display:block;border-radius:18px;background:#dff0ff}
#fx{position:absolute;inset:0;pointer-events:none;border-radius:18px;overflow:hidden}
#toast{position:absolute;left:12px;right:12px;bottom:12px;padding:11px 13px;background:rgba(255,255,255,.92);border:1px solid #c9def5;border-radius:14px;font-size:13px;color:#21405f;opacity:0;transform:translateY(8px);transition:.25s;box-shadow:0 8px 24px rgba(104,144,188,.18)}
#flash{position:absolute;inset:0;opacity:0;background:radial-gradient(circle at center, rgba(255,255,255,.55), rgba(255,255,255,0) 60%)}
.comboFloat{position:absolute;left:50%;top:16px;transform:translateX(-50%) translateY(-6px);padding:10px 16px;border-radius:999px;background:linear-gradient(180deg,rgba(255,252,239,.98),rgba(255,243,213,.96));border:1px solid #e7c979;color:#7a5614;font-size:14px;font-weight:800;letter-spacing:.02em;opacity:0;pointer-events:none;box-shadow:0 10px 24px rgba(167,122,31,.18);transition:.25s}
#side{padding:10px;display:grid;grid-template-rows:auto auto auto auto 1fr;gap:8px;min-height:0}
.section{padding:10px;border-radius:14px;background:linear-gradient(180deg,#fbfdff,#f2f8ff);border:1px solid #dbe8f7}
.section h3{margin:0 0 8px 0;font-size:13px;color:#2f5277}
#stageList{display:grid;grid-template-columns:1fr;gap:6px;max-height:180px;overflow:auto;padding-right:2px}
.stageBtn,.towerBtn,.ctlBtn{width:100%;border:1px solid #b7cff0;background:linear-gradient(180deg,#ffffff,#edf5ff);color:#244462;border-radius:12px;padding:10px 10px;font-weight:700;font-size:12px;text-align:left;cursor:pointer;box-shadow:0 4px 10px rgba(126,161,199,.10)}
.stageBtn small,.towerBtn small{display:block;color:#67819f;font-weight:500;margin-top:4px;line-height:1.35}
.stageBtn.active,.towerBtn.active{outline:2px solid var(--gold);border-color:#d7b468;background:linear-gradient(180deg,#fffaf0,#f7edd0)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
#log{font-size:12px;line-height:1.5;color:#32506f;overflow:auto;max-height:none;min-height:120px;white-space:pre-line}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px}
.ctlBtn{font-size:13px;text-align:center}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#edf5ff;border:1px solid #c9dbf3;color:#40607f;font-size:11px;margin-right:6px;margin-bottom:6px}
.legend{display:flex;flex-wrap:wrap;gap:6px}
.small{font-size:11px;color:var(--sub);line-height:1.55}
.selCard{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.selMeta{font-size:12px;color:#32506f;line-height:1.5}
.selMeta b{display:block;color:#23405d;font-size:13px;margin-bottom:2px}
.selBtns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.miniBtn{border:1px solid #b7cff0;background:linear-gradient(180deg,#ffffff,#edf5ff);color:#244462;border-radius:10px;padding:8px 10px;font-weight:700;font-size:12px;cursor:pointer}
.miniBtn:disabled{opacity:.45;cursor:default}
.waveTag{display:inline-block;padding:4px 8px;border-radius:999px;background:#eef5ff;border:1px solid #d4e4f6;color:#4f6d8f;font-size:11px;margin:0 6px 6px 0}

@media (max-width:920px){
  #app{grid-template-rows:auto auto auto 1fr auto}
  .main{grid-template-columns:1fr;grid-template-rows:minmax(360px,48vh) auto}
  #side{grid-template-rows:auto auto auto auto}
  #stageList{max-height:135px}
}
</style>
</head>
<body>
<div id="app">
  <div class="top card">
    <div class="title">WORLD TD ATLAS</div>
    <div class="sub">八つの防衛戦線を巡り、連鎖と強化で押し返す爽快タワーディフェンスです。ステージごとに地形と勝ち筋が変わります。</div>
  </div>
  <div class="stats card">
    <div class="stat"><div class="k">資金</div><div class="v" id="gold">0</div></div>
    <div class="stat"><div class="k">拠点耐久</div><div class="v" id="life">0</div></div>
    <div class="stat"><div class="k">Wave</div><div class="v" id="wave">0 / 0</div></div>
    <div class="stat"><div class="k">敵残数</div><div class="v" id="enemyCount">0</div></div>
    <div class="stat"><div class="k">連鎖</div><div class="v" id="combo">x1.0</div></div>
    <div class="stat"><div class="k">選択</div><div class="v" id="selected">なし</div></div>
  </div>
  <div class="main">
    <div class="left">
      <div id="wrap" class="card">
        <canvas id="game" width="960" height="540"></canvas>
        <div id="fx"><div id="flash"></div><div id="comboFx" class="comboFloat"></div><div id="toast"></div></div>
      </div>
      <div class="controls card">
        <button class="ctlBtn" id="startBtn">開始</button>
        <button class="ctlBtn" id="nextBtn">次のWave</button>
        <button class="ctlBtn" id="resetBtn">ステージ再読込</button>
      </div>
    </div>
    <div id="side" class="card">
      <div class="section">
        <h3>ステージ選択</h3>
        <div id="stageList"></div>
      </div>
      <div class="section">
        <h3>タワー</h3>
        <div class="grid2" id="towerList"></div>
      </div>
      <div class="section">
        <h3>このステージの着想</h3>
        <div id="stageInfo" class="small"></div>
        <div id="wavePreview" class="small" style="margin-top:8px"></div>
      </div>
      <div class="section">
        <h3>選択中タワー</h3>
        <div class="selCard">
          <div class="selMeta" id="towerDetail"><b>未選択</b>設置後にタワーをタップすると強化できます。</div>
          <div style="font-size:20px;color:#6a88ac" id="towerIcon">◌</div>
        </div>
        <div class="selBtns">
          <button class="miniBtn" id="upgradeBtn" disabled>強化</button>
          <button class="miniBtn" id="sellBtn" disabled>売却</button>
        </div>
      </div>
      <div class="section" style="min-height:0;display:grid;grid-template-rows:auto auto 1fr;gap:8px">
        <h3>戦術ログ</h3>
        <div class="legend">
          <span class="badge">クリックで設置</span>
          <span class="badge">右クリックで売却</span>
          <span class="badge">属性連鎖あり</span>
          <span class="badge">連続撃破で倍率上昇</span>
        </div>
        <div id="log"></div>
      </div>
    </div>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  const wrap = document.getElementById('wrap');
  const goldEl = document.getElementById('gold');
  const lifeEl = document.getElementById('life');
  const waveEl = document.getElementById('wave');
  const enemyCountEl = document.getElementById('enemyCount');
  const comboEl = document.getElementById('combo');
  const selectedEl = document.getElementById('selected');
  const stageListEl = document.getElementById('stageList');
  const towerListEl = document.getElementById('towerList');
  const stageInfoEl = document.getElementById('stageInfo');
  const wavePreviewEl = document.getElementById('wavePreview');
  const towerDetailEl = document.getElementById('towerDetail');
  const towerIconEl = document.getElementById('towerIcon');
  const upgradeBtn = document.getElementById('upgradeBtn');
  const sellBtn = document.getElementById('sellBtn');
  const logEl = document.getElementById('log');
  const toastEl = document.getElementById('toast');
  const flashEl = document.getElementById('flash');
  const comboFxEl = document.getElementById('comboFx');
  const startBtn = document.getElementById('startBtn');
  const nextBtn = document.getElementById('nextBtn');
  const resetBtn = document.getElementById('resetBtn');

  const TOWERS = {
    bolt:{name:'ボルト塔', cost:90, range:105, rate:0.68, damage:15, color:'#89a8ff', desc:'軽量単体。堅実。'},
    burst:{name:'バースト砲', cost:140, range:92, rate:1.3, damage:26, splash:42, color:'#ff9a6b', desc:'範囲砲。集団に強い。'},
    frost:{name:'フロスト塔', cost:120, range:90, rate:1.0, damage:7, slow:0.56, slowTime:1.3, color:'#7ed6ff', desc:'減速。連鎖の起点。'},
    arc:{name:'アーク塔', cost:170, range:118, rate:1.45, damage:12, chain:3, color:'#d19cff', desc:'感電連鎖。遅い敵に刺さる。'},
    prism:{name:'プリズム塔', cost:200, range:110, rate:1.6, damage:21, color:'#7dffb4', desc:'凍結済み敵に破砕ボーナス。'}
  };

  const ENEMY_TYPES = {
    runner:{name:'ランナー', hp:44, speed:84, reward:12, color:'#ffd071'},
    brute:{name:'ブルート', hp:135, speed:38, reward:24, color:'#ff7f7f'},
    swarm:{name:'スウォーム', hp:24, speed:92, reward:7, color:'#f4f4f4'},
    ghost:{name:'スペクター', hp:68, speed:70, reward:18, color:'#8fd4ff', resist:'splash'},
    titan:{name:'タイタン', hp:430, speed:32, reward:90, color:'#c38dff'},
    boss:{name:'オーバーロード', hp:980, speed:28, reward:260, color:'#ffb86d'}
  };

  const STAGES = [
    {
      id:'lanes',
      name:'1. 三列芝庭の防衛',
      short:'横列レーン型',
      tribute:'レーン管理の読み合いを抽出。固定レーンをどう埋めるかが核。',
      inspiration:'着想: Plants vs. Zombies 系。複数レーンで、目の前の脅威へ即応する設計を抽出しました。直線火力と範囲火力の住み分けが重要です。',
      pads:[{x:190,y:135},{x:310,y:135},{x:430,y:135},{x:570,y:135},{x:690,y:135},{x:190,y:270},{x:310,y:270},{x:430,y:270},{x:570,y:270},{x:690,y:270},{x:190,y:405},{x:310,y:405},{x:430,y:405},{x:570,y:405},{x:690,y:405}],
      paths:[[[0,135],[150,135],[300,135],[470,135],[650,135],[820,135],[930,270]],[[0,270],[180,270],[340,270],[520,270],[700,270],[930,270]],[[0,405],[150,405],[320,405],[510,405],[680,405],[830,405],[930,270]]],
      waves:[['runner','runner','runner','swarm','runner','runner'],['runner','brute','runner','runner','swarm','runner'],['ghost','runner','runner','brute','swarm','swarm'],['brute','brute','runner','ghost','runner'],['titan','runner','swarm','swarm','ghost']]
    },
    {
      id:'choke',
      name:'2. 山峡関門',
      short:'詰まり場重視',
      tribute:'足止めと集中砲火の快楽を抽出。',
      inspiration:'着想: Kingdom Rush 系。一本道の中に曲がりと詰まり場を増やし、減速と範囲砲の気持ちよさを前面に出しました。',
      pads:[{x:140,y:120},{x:260,y:190},{x:370,y:120},{x:500,y:190},{x:620,y:120},{x:740,y:190},{x:840,y:300},{x:710,y:380},{x:560,y:320},{x:410,y:380},{x:260,y:320}],
      paths:[[[0,80],[130,80],[130,210],[310,210],[310,90],[510,90],[510,230],[735,230],[735,390],[930,390]]],
      waves:[['runner','runner','runner','brute','runner'],['runner','swarm','swarm','brute','runner','runner'],['ghost','brute','runner','ghost','swarm'],['brute','brute','runner','runner','ghost'],['titan','brute','ghost','runner']]
    },
    {
      id:'loop',
      name:'3. 螺旋回廊',
      short:'ぐるり周回型',
      tribute:'周回路で射程効率を稼ぐ快感を抽出。',
      inspiration:'着想: Bloons TD 系。曲線路が中心をぐるりと巻く構成で、良い位置に置いた一基が何度も働く設計にしました。',
      pads:[{x:470,y:270},{x:370,y:270},{x:570,y:270},{x:470,y:170},{x:470,y:370},{x:310,y:180},{x:630,y:180},{x:310,y:360},{x:630,y:360},{x:220,y:270},{x:720,y:270}],
      paths:[[[0,270],[120,270],[120,120],[820,120],[820,420],[220,420],[220,200],[720,200],[720,340],[320,340],[320,270],[930,270]]],
      waves:[['runner','runner','runner','runner','swarm','swarm'],['ghost','runner','runner','brute','runner'],['swarm','swarm','swarm','ghost','ghost'],['brute','brute','runner','runner','ghost'],['titan','runner','runner','ghost','swarm']]
    },
    {
      id:'cores',
      name:'4. 双核搬送路',
      short:'分岐ルーティング',
      tribute:'入口と出口の読みを抽出。',
      inspiration:'着想: Defense Grid 系。経路が途中で分岐し、守るべき終点が複数へ見える構成です。どこに火力を寄せるかが問われます。',
      pads:[{x:210,y:140},{x:350,y:110},{x:520,y:150},{x:710,y:120},{x:240,y:300},{x:400,y:260},{x:560,y:310},{x:720,y:280},{x:210,y:430},{x:390,y:420},{x:620,y:430}],
      paths:[[[0,270],[150,270],[150,120],[420,120],[420,250],[780,250],[780,120],[930,120]],[[0,270],[180,270],[180,400],[450,400],[450,290],[780,290],[780,420],[930,420]]],
      waves:[['runner','runner','ghost','runner','runner'],['brute','runner','swarm','swarm','runner'],['ghost','ghost','runner','brute','runner'],['brute','brute','swarm','ghost'],['titan','runner','ghost','runner']]
    },
    {
      id:'element',
      name:'5. 元素祭壇',
      short:'属性連鎖型',
      tribute:'属性ビルドの思考を抽出。',
      inspiration:'着想: Element TD 系。祭壇の近くに置いた塔は少し強化されます。フロストで凍らせ、アークで感電させ、プリズムで砕く流れが主役です。',
      pads:[{x:170,y:150, shrine:'ice'},{x:320,y:150},{x:470,y:150, shrine:'arc'},{x:620,y:150},{x:770,y:150, shrine:'prism'},{x:250,y:320},{x:400,y:320},{x:550,y:320},{x:700,y:320},{x:470,y:440}],
      paths:[[[0,270],[120,270],[220,170],[360,170],[470,300],[580,170],[710,170],[830,270],[930,270]]],
      waves:[['runner','runner','runner','ghost','runner'],['swarm','swarm','ghost','runner','runner'],['brute','runner','ghost','runner'],['brute','ghost','ghost','swarm'],['titan','brute','ghost']]
    },
    {
      id:'tiles',
      name:'6. 浮遊島継ぎ足し戦線',
      short:'盤面拡張型',
      tribute:'置くたび地形が変わる楽しさを抽出。',
      inspiration:'着想: Isle of Arrows 系。各Wave後に新しい設置マスが一つ増えます。序盤は窮屈、後半は自由度が増す盤面変化が肝です。',
      pads:[{x:220,y:170},{x:380,y:150},{x:540,y:170},{x:700,y:150},{x:300,y:330},{x:460,y:350}],
      bonusPads:[{x:160,y:290},{x:610,y:340},{x:790,y:280},{x:520,y:80}],
      paths:[[[0,220],[140,220],[240,120],[420,120],[540,260],[700,260],[780,180],[930,180]]],
      waves:[['runner','runner','runner','swarm'],['ghost','runner','runner','swarm'],['brute','runner','ghost'],['brute','ghost','swarm','runner'],['titan','runner','ghost']]
    },
    {
      id:'traps',
      name:'7. 地下罠庫',
      short:'罠回廊型',
      tribute:'押し戻しと危険地形の読み合いを抽出。',
      inspiration:'着想: Dungeon Warfare 系。通路上の圧搾床が一定周期で発動し、敵を少し押し戻します。純火力より時間稼ぎが強い面です。',
      pads:[{x:170,y:120},{x:300,y:180},{x:430,y:120},{x:560,y:180},{x:690,y:120},{x:820,y:180},{x:250,y:360},{x:410,y:420},{x:610,y:400},{x:800,y:360}],
      trapZones:[{x:235,y:250,r:42},{x:515,y:250,r:42},{x:770,y:300,r:42}],
      paths:[[[0,250],[210,250],[210,120],[470,120],[470,250],[730,250],[730,380],[930,380]]],
      waves:[['runner','runner','swarm','runner'],['ghost','runner','brute','runner'],['swarm','swarm','ghost','ghost'],['brute','brute','runner'],['titan','ghost','runner']]
    },
    {
      id:'gems',
      name:'8. 宝石回路塔',
      short:'増幅結晶型',
      tribute:'育てた一基が化ける感覚を抽出。',
      inspiration:'着想: GemCraft 系。中央の増幅結晶の近くに置いた塔は射程と威力が上がります。高価な塔を濃く育てる贅沢が強い終盤面です。',
      pads:[{x:180,y:150},{x:330,y:150},{x:470,y:150},{x:620,y:150},{x:770,y:150},{x:250,y:320},{x:380,y:320},{x:560,y:320},{x:690,y:320},{x:470,y:430}],
      gemCore:{x:470,y:270,r:90},
      paths:[[[0,270],[120,270],[200,130],[430,130],[470,270],[510,410],[760,410],[840,270],[930,270]]],
      waves:[['runner','runner','ghost','runner','swarm'],['brute','runner','runner','ghost'],['ghost','ghost','swarm','swarm'],['brute','brute','ghost','runner'],['titan','ghost','runner','swarm']]
    }
  ];

  let state = null;
  let towerType = 'bolt';
  let animationId = 0;
  let lastTime = 0;

  function resize() {
    const rect = wrap.getBoundingClientRect();
    canvas.width = Math.floor(rect.width * DPR);
    canvas.height = Math.floor(rect.height * DPR);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function dist(a,b){ return Math.hypot(a.x - b.x, a.y - b.y); }
  function lerp(a,b,t){ return a + (b-a) * t; }
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function rand(min,max){ return Math.random() * (max-min) + min; }
  function fmt(n){ return Math.round(n); }

  function deepCloneStage(stage){ return JSON.parse(JSON.stringify(stage)); }

  function makeStageButtons(){
    stageListEl.innerHTML = '';
    STAGES.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'stageBtn' + (i===0 ? ' active' : '');
      btn.innerHTML = `${s.name}<small>${s.short}</small>`;
      btn.onclick = () => {
        [...stageListEl.children].forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        loadStage(s.id);
      };
      stageListEl.appendChild(btn);
    });
  }

  function makeTowerButtons(){
    towerListEl.innerHTML = '';
    Object.entries(TOWERS).forEach(([key, t]) => {
      const btn = document.createElement('button');
      btn.className = 'towerBtn' + (key === towerType ? ' active' : '');
      btn.innerHTML = `${t.name} ${t.cost}<small>${t.desc}</small>`;
      btn.onclick = () => {
        towerType = key;
        [...towerListEl.children].forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        selectedEl.textContent = t.name;
      };
      towerListEl.appendChild(btn);
    });
    selectedEl.textContent = TOWERS[towerType].name;
  }

  function loadStage(id){
    const original = STAGES.find(s => s.id === id) || STAGES[0];
    const stage = deepCloneStage(original);
    state = {
      stage,
      started:false,
      gold: 300,
      life: 20,
      waveIndex: 0,
      enemies: [],
      projectiles: [],
      towers: [],
      particles: [],
      queue: [],
      spawnTimer: 0,
      time: 0,
      trapPulse: 0,
      win:false,
      lose:false,
      logs: [],
      stageId: id,
      activePaths: stage.paths,
      currentWaveMax: stage.waves.length,
      combo: 1,
      comboTimer: 0,
      chainKills: 0,
      surge: 0,
      lastChainText: '',
      selectedTowerId: null,
      overdriveTime: 0,
      overdriveTier: 0,
      bossAnnounced: false,
    };
    stageInfoEl.textContent = stage.inspiration;
    renderWavePreview();
    renderTowerSelection();
    pushLog(stage.name + ' を読込。' + stage.tribute);
    if(stage.id === 'tiles') pushLog('この面では各Wave終了後に新しい設置マスが1つ解放されます。');
    if(stage.id === 'element') pushLog('祭壇の近くでは塔が強化されます。属性の順番で火力が跳ねます。');
    if(stage.id === 'traps') pushLog('圧搾床が周期で発動し、敵を押し戻します。');
    if(stage.id === 'gems') pushLog('中央結晶付近の塔は強化されます。');
    pushLog('短時間で連続撃破すると連鎖倍率が上がり、報酬と火力が伸びます。');
    renderWavePreview();
    updateHud();
  }


  function renderWavePreview(){
    if(!state) return;
    const idx = state.waveIndex;
    const next = state.stage.waves[idx];
    if(!next){ wavePreviewEl.innerHTML = '最終Waveまで到達済みです。'; return; }
    const counts = {};
    next.forEach(t => counts[t] = (counts[t] || 0) + 1);
    const tags = Object.entries(counts).map(([k,v]) => `<span class="waveTag">${ENEMY_TYPES[k].name} ${v}</span>`).join('');
    const note = idx === state.stage.waves.length - 1 ? '最終Waveには連鎖専用ボスが混ざります。' : '次Waveの構成予告です。';
    wavePreviewEl.innerHTML = '<div style="margin-top:6px">次Wave予告</div>' + tags + '<div style="margin-top:4px">' + note + '</div>';
  }

  function getTowerStats(t){
    const def = TOWERS[t.type];
    const lvMul = 1 + (t.level - 1) * 0.35;
    const range = def.range * (t.bonus || 1) * (1 + (t.level - 1) * 0.08);
    const damage = def.damage * (t.bonus || 1) * lvMul;
    const rate = Math.max(0.38, def.rate * (1 - (t.level - 1) * 0.1) * (state && state.overdriveTime > 0 ? 0.84 : 1));
    return {range, damage, rate};
  }

  function renderTowerSelection(){
    if(!state) return;
    const t = state.towers.find(x => x.id === state.selectedTowerId);
    if(!t){
      towerDetailEl.innerHTML = '<b>未選択</b>設置後にタワーをタップすると強化できます。';
      towerIconEl.textContent = '◌';
      upgradeBtn.disabled = true;
      sellBtn.disabled = true;
      return;
    }
    const def = TOWERS[t.type];
    const st = getTowerStats(t);
    const upCost = t.level >= 3 ? null : Math.floor(def.cost * (0.7 + t.level * 0.45));
    towerDetailEl.innerHTML = `<b>${def.name} Lv.${t.level}</b>威力 ${Math.round(st.damage)} 射程 ${Math.round(st.range)}<br>連射 ${st.rate.toFixed(2)}秒` + (upCost ? `<br>次強化 ${upCost}` : '<br>最大強化済み');
    towerIconEl.textContent = t.level === 3 ? '◆' : t.level === 2 ? '◈' : '●';
    upgradeBtn.disabled = !upCost || state.gold < upCost;
    sellBtn.disabled = false;
  }

  function selectTowerAt(x,y){
    let best = null, bestD = 24;
    for(const t of state.towers){
      const d = Math.hypot(t.x - x, t.y - y);
      if(d < bestD){ best = t; bestD = d; }
    }
    state.selectedTowerId = best ? best.id : null;
    renderTowerSelection();
    if(best) selectedEl.textContent = TOWERS[best.type].name + ' Lv.' + best.level;
    return !!best;
  }

  function upgradeSelectedTower(){
    if(!state) return;
    const t = state.towers.find(x => x.id === state.selectedTowerId);
    if(!t) return;
    const def = TOWERS[t.type];
    if(t.level >= 3){ pushLog('これ以上は強化できません。'); return; }
    const cost = Math.floor(def.cost * (0.7 + t.level * 0.45));
    if(state.gold < cost){ pushLog('強化資金が足りません。'); return; }
    state.gold -= cost;
    t.level += 1;
    t.cooldown *= 0.65;
    pushLog(`${def.name} を Lv.${t.level} へ強化。`);
    renderTowerSelection();
    updateHud();
    flash();
  }

  function sellSelectedTower(){
    if(!state) return;
    const idx = state.towers.findIndex(x => x.id === state.selectedTowerId);
    if(idx < 0) return;
    const t = state.towers[idx];
    const refund = Math.floor(TOWERS[t.type].cost * (0.45 + t.level * 0.18));
    state.gold += refund;
    state.towers.splice(idx,1);
    state.selectedTowerId = null;
    pushLog(TOWERS[t.type].name + ' を売却。資金 +' + refund);
    renderTowerSelection();
    updateHud();
  }

  function pushLog(text){
    if(!state) return;
    state.logs.unshift(text);
    state.logs = state.logs.slice(0, 14);
    logEl.textContent = state.logs.join('\n');
    toast(text);
  }

  function toast(text){
    toastEl.textContent = text;
    toastEl.style.opacity = '1';
    toastEl.style.transform = 'translateY(0)';
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(() => {
      toastEl.style.opacity = '0';
      toastEl.style.transform = 'translateY(8px)';
    }, 1700);
  }

  function flash(){
    flashEl.style.transition = 'none';
    flashEl.style.opacity = '0.8';
    requestAnimationFrame(() => {
      flashEl.style.transition = 'opacity .35s';
      flashEl.style.opacity = '0';
    });
  }

  function comboPopup(text){
    comboFxEl.textContent = text;
    comboFxEl.style.opacity = '1';
    comboFxEl.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(comboFxEl._t);
    comboFxEl._t = setTimeout(() => {
      comboFxEl.style.opacity = '0';
      comboFxEl.style.transform = 'translateX(-50%) translateY(-6px)';
    }, 900);
  }

  function updateHud(){
    if(!state) return;
    goldEl.textContent = state.gold;
    lifeEl.textContent = state.life;
    waveEl.textContent = `${Math.min(state.waveIndex, state.stage.waves.length)} / ${state.stage.waves.length}`;
    enemyCountEl.textContent = state.enemies.length + state.queue.length;
    comboEl.textContent = `x${state.combo.toFixed(1)}`;
    renderTowerSelection();
  }

  function pathLength(path){
    let len = 0;
    for(let i=0;i<path.length-1;i++) len += Math.hypot(path[i+1][0]-path[i][0], path[i+1][1]-path[i][1]);
    return len;
  }

  function pointOnPath(path, progress){
    let remain = progress;
    for(let i=0;i<path.length-1;i++){
      const ax = path[i][0], ay = path[i][1], bx = path[i+1][0], by = path[i+1][1];
      const seg = Math.hypot(bx-ax, by-ay);
      if(remain <= seg){
        const t = seg === 0 ? 0 : remain / seg;
        return {x: lerp(ax,bx,t), y: lerp(ay,by,t)};
      }
      remain -= seg;
    }
    const last = path[path.length-1];
    return {x:last[0], y:last[1]};
  }

  function spawnWave(){
    if(!state || state.lose || state.win) return;
    if(state.waveIndex >= state.stage.waves.length){
      pushLog('これ以上のWaveはありません。');
      return;
    }
    const wave = state.stage.waves[state.waveIndex];
    const newQueue = [];
    wave.forEach((type, idx) => {
      const pathIndex = idx % state.stage.paths.length;
      newQueue.push({type, pathIndex, delay: idx * 0.85});
    });
    if(state.waveIndex === state.stage.waves.length - 1){
      newQueue.push({type:'boss', pathIndex:0, delay: wave.length * 1.1});
      state.bossAnnounced = true;
    }
    if(state.stage.id === 'cores'){
      wave.forEach((type, idx) => {
        if(idx % 2 === 0 && state.stage.paths.length > 1) newQueue[idx].pathIndex = (idx + 1) % state.stage.paths.length;
      });
    }
    state.queue = newQueue;
    state.spawnTimer = 0;
    state.waveIndex += 1;
    pushLog('Wave ' + state.waveIndex + ' 開始。');
    flash();
    renderWavePreview();
    updateHud();
  }

  function buildTower(x,y){
    const stage = state.stage;
    const pads = stage.pads;
    for(let i=0;i<pads.length;i++){
      const p = pads[i];
      if(Math.hypot(p.x - x, p.y - y) < 22){
        const occupied = state.towers.some(t => t.padIndex === i);
        if(occupied){ pushLog('その設置マスは使用中です。'); return; }
        const tDef = TOWERS[towerType];
        if(state.gold < tDef.cost){ pushLog('資金が足りません。'); return; }
        const tower = {id: Math.random().toString(36).slice(2), padIndex:i, x:p.x, y:p.y, type:towerType, cooldown: rand(0, tDef.rate), bonus:1, level:1};
        if(stage.id === 'element' && p.shrine){ tower.bonus = 1.18; }
        if(stage.id === 'gems' && stage.gemCore && Math.hypot(p.x-stage.gemCore.x, p.y-stage.gemCore.y) <= stage.gemCore.r){ tower.bonus = 1.28; }
        state.towers.push(tower);
        state.gold -= tDef.cost;
        state.selectedTowerId = tower.id;
        pushLog(`${tDef.name} を設置。` + (tower.bonus>1 ? '特殊地形で強化中。' : ''));
        updateHud();
        renderTowerSelection();
        return;
      }
    }
  }

  function sellTower(x,y){
    for(let i=0;i<state.towers.length;i++){
      const t = state.towers[i];
      if(Math.hypot(t.x-x, t.y-y) < 22){
        const refund = Math.floor(TOWERS[t.type].cost * 0.65);
        state.gold += refund;
        if(state.selectedTowerId === t.id) state.selectedTowerId = null;
        state.towers.splice(i,1);
        pushLog(TOWERS[t.type].name + ' を売却。資金 +' + refund);
        updateHud();
        renderTowerSelection();
        return;
      }
    }
  }

  function spawnEnemy(type, pathIndex){
    const base = ENEMY_TYPES[type];
    const path = state.stage.paths[pathIndex];
    const len = pathLength(path);
    state.enemies.push({
      type,
      hp: base.hp * (1 + (state.waveIndex - 1) * 0.18),
      maxHp: base.hp * (1 + (state.waveIndex - 1) * 0.18),
      speed: base.speed * (1 + (state.waveIndex - 1) * 0.03),
      reward: Math.floor(base.reward * (1 + (state.waveIndex - 1) * 0.14)),
      color: base.color,
      pathIndex,
      progress: 0,
      pathLen: len,
      x: path[0][0], y: path[0][1],
      slowMul:1, slowTime:0, shocked:0, chill:false, alive:true,
      shield: type === 'boss' ? base.hp * 0.38 : 0,
      phase: 1,
      bossPulse: 0
    });
  }

  function update(dt){
    if(!state) return;
    state.time += dt;
    if(state.started && !state.win && !state.lose){
      if(state.overdriveTime > 0){ state.overdriveTime -= dt; if(state.overdriveTime <= 0){ state.overdriveTier = 0; pushLog('オーバードライブ終了。'); } }
      if(state.comboTimer > 0){
        state.comboTimer -= dt;
        if(state.comboTimer <= 0){
          if(state.combo > 1){
            state.combo = 1;
            state.chainKills = 0;
            comboPopup('連鎖終了');
          }
          state.comboTimer = 0;
        }
      }
      if(state.queue.length){
        state.spawnTimer += dt;
        while(state.queue.length && state.spawnTimer >= state.queue[0].delay){
          const q = state.queue.shift();
          spawnEnemy(q.type, q.pathIndex);
          updateHud();
        }
      }
      if(state.stage.id === 'traps'){
        state.trapPulse += dt;
        if(state.trapPulse >= 2.6){
          state.trapPulse = 0;
          state.enemies.forEach(e => {
            state.stage.trapZones.forEach(z => {
              if(Math.hypot(e.x-z.x,e.y-z.y) < z.r){
                e.progress = Math.max(0, e.progress - 48);
                state.particles.push({x:e.x,y:e.y,r:16,life:0.45,color:'rgba(255,200,120,.7)'});
              }
            });
          });
          pushLog('圧搾床が作動。敵の足並みが乱れました。');
        }
      }

      for(const e of state.enemies){
        if(e.slowTime > 0){ e.slowTime -= dt; if(e.slowTime <= 0){ e.slowMul = 1; e.chill = false; } }
        if(e.shocked > 0) e.shocked -= dt;
        if(e.type === 'boss'){
          const hpRatio = (e.hp + e.shield) / e.maxHp;
          if(e.phase === 1 && hpRatio < 0.66){
            e.phase = 2; e.speed *= 1.18; pushLog('ボスが第二段階へ移行。防壁が脈動しています。'); flash();
          } else if(e.phase === 2 && hpRatio < 0.33){
            e.phase = 3; e.speed *= 1.12; pushLog('ボスが最終段階へ移行。連鎖を切らさず押し切ってください。'); flash();
          }
          e.bossPulse += dt;
          if(e.bossPulse >= 3.8){
            e.bossPulse = 0;
            state.enemies.forEach(o => { if(o !== e && Math.hypot(o.x-e.x,o.y-e.y) < 88) o.hp = Math.min(o.maxHp, o.hp + 16 * e.phase); });
            state.particles.push({x:e.x,y:e.y,r:22,life:0.7,color:'rgba(255,184,109,.45)'});
          }
        }
        const sp = e.speed * e.slowMul * (state.overdriveTime > 0 ? 1 : 1);
        e.progress += sp * dt;
        const path = state.stage.paths[e.pathIndex];
        const p = pointOnPath(path, e.progress);
        e.x = p.x; e.y = p.y;
        if(e.progress >= e.pathLen){
          e.alive = false;
          state.life -= (e.type === 'titan' ? 4 : e.type === 'brute' ? 2 : 1);
          pushLog(ENEMY_TYPES[e.type].name + ' が拠点へ到達。');
          flash();
          if(state.life <= 0){
            state.life = 0;
            state.lose = true;
            state.started = false;
            pushLog('防衛線が崩壊。敗北です。');
          }
        }
      }

      for(const t of state.towers){
        const def = TOWERS[t.type];
        t.cooldown -= dt;
        if(t.cooldown > 0) continue;
        const stats = getTowerStats(t);
        const range = stats.range;
        const inRange = state.enemies.filter(e => e.alive && dist(t,e) <= range);
        if(!inRange.length) continue;
        inRange.sort((a,b) => b.progress - a.progress);
        const target = inRange[0];
        fireTower(t, target);
        t.cooldown = stats.rate;
      }

      state.projectiles.forEach(p => {
        p.life -= dt;
        if(p.life <= 0) p.dead = true;
        p.x += p.vx * dt; p.y += p.vy * dt;
      });
      state.projectiles = state.projectiles.filter(p => !p.dead);

      state.particles.forEach(p => { p.life -= dt; p.r += dt * 30; });
      state.particles = state.particles.filter(p => p.life > 0);
      state.surge = Math.max(0, state.surge - dt * 0.45);

      state.enemies = state.enemies.filter(e => e.alive && e.hp > 0);

      if(!state.queue.length && !state.enemies.length && state.started){
        if(state.waveIndex >= state.stage.waves.length){
          state.win = true;
          state.started = false;
          pushLog('全Wave防衛成功。勝利です。');
          flash();
        } else {
          state.started = false;
          state.combo = 1;
          state.comboTimer = 0;
          state.chainKills = 0;
          state.surge = Math.max(0, state.surge - 4);
          renderWavePreview();
          if(state.stage.id === 'tiles' && state.stage.bonusPads && state.stage.bonusPads.length){
            const nextPad = state.stage.bonusPads.shift();
            state.stage.pads.push(nextPad);
            pushLog('浮遊島が拡張され、新しい設置マスが現れました。');
          } else {
            pushLog('Waveクリア。次のWaveを選べます。');
          }
        }
      }
    }
    updateHud();
  }

  function fireTower(t, target){
    const def = TOWERS[t.type];
    const stats = getTowerStats(t);
    const baseDamage = stats.damage * state.combo * (1 + state.surge * 0.03);
    if(t.type === 'bolt'){
      hitEnemy(target, baseDamage, 'bolt', t);
      beam(t, target, def.color);
    } else if(t.type === 'burst'){
      state.enemies.forEach(e => {
        if(e.alive && Math.hypot(e.x-target.x,e.y-target.y) <= def.splash){
          const dmg = e.type === 'ghost' ? baseDamage * 0.55 : baseDamage;
          hitEnemy(e, dmg, 'burst', t);
        }
      });
      beam(t, target, def.color);
      state.particles.push({x:target.x,y:target.y,r:8,life:0.35,color:'rgba(255,170,110,.75)'});
    } else if(t.type === 'frost'){
      hitEnemy(target, baseDamage, 'frost', t);
      target.slowMul = def.slow;
      target.slowTime = def.slowTime;
      target.chill = true;
      beam(t, target, def.color);
    } else if(t.type === 'arc'){
      const candidates = state.enemies.filter(e => e.alive).sort((a,b)=>Math.hypot(a.x-target.x,a.y-target.y)-Math.hypot(b.x-target.x,b.y-target.y));
      let count = 0;
      for(const e of candidates){
        if(count >= def.chain) break;
        if(Math.hypot(e.x-target.x,e.y-target.y) <= 70 || e === target){
          hitEnemy(e, baseDamage * (e.chill ? 1.35 : 1), 'arc', t);
          e.shocked = 1.0;
          state.projectiles.push({x:target.x,y:target.y,vx:(e.x-target.x)*8,vy:(e.y-target.y)*8,life:0.08,dead:false,color:'rgba(209,156,255,.7)'});
          count++;
        }
      }
      beam(t, target, def.color);
    } else if(t.type === 'prism'){
      const dmg = baseDamage * (target.chill ? 2.2 : 1) * (target.shocked > 0 ? 1.35 : 1);
      hitEnemy(target, dmg, 'prism', t);
      beam(t, target, def.color);
    }
  }

  function beam(from, to, color){
    const dx = to.x - from.x, dy = to.y - from.y;
    state.projectiles.push({x:from.x,y:from.y,vx:dx*12,vy:dy*12,life:0.06,dead:false,color});
  }

  function hitEnemy(enemy, dmg, kind, tower){
    if(enemy.shield > 0){
      const shieldDmg = Math.min(enemy.shield, dmg);
      enemy.shield -= shieldDmg;
      dmg -= shieldDmg;
      state.particles.push({x:enemy.x,y:enemy.y,r:9,life:0.3,color:'rgba(255,244,181,.7)'});
    }
    enemy.hp -= dmg;
    state.particles.push({x:enemy.x,y:enemy.y,r:7,life:0.25,color:kind==='frost' ? 'rgba(126,214,255,.7)' : kind==='arc' ? 'rgba(209,156,255,.7)' : kind==='prism' ? 'rgba(125,255,180,.62)' : 'rgba(255,255,255,.5)'});
    if(enemy.hp <= 0 && enemy.alive){
      enemy.alive = false;
      registerKill(enemy, kind, tower);
      state.particles.push({x:enemy.x,y:enemy.y,r:14,life:0.5,color:'rgba(255,210,110,.75)'});
    }
  }

  function registerKill(enemy, kind, tower){
    const nowSynergy = (enemy.chill ? 1 : 0) + (enemy.shocked > 0 ? 1 : 0);
    const synergyBonus = kind === 'prism' && enemy.chill ? 0.4 : kind === 'arc' && enemy.chill ? 0.2 : kind === 'burst' && enemy.type === 'swarm' ? 0.2 : 0;
    state.chainKills += 1;
    state.combo = clamp(1 + state.chainKills * 0.22 + nowSynergy * 0.18 + synergyBonus + state.surge * 0.02, 1, 4.8);
    state.comboTimer = 2.8;
    const reward = Math.floor(enemy.reward * state.combo);
    state.gold += reward;
    state.surge = Math.min(25, state.surge + 1 + nowSynergy);
    const labels = [];
    if(enemy.chill) labels.push('凍結');
    if(enemy.shocked > 0) labels.push('感電');
    if(kind === 'prism' && enemy.chill) labels.push('破砕');
    if(kind === 'burst' && enemy.type === 'swarm') labels.push('群れ一掃');
    const chainText = `${labels.length ? labels.join('・') + ' ' : ''}${state.chainKills}連鎖 x${state.combo.toFixed(1)}`;
    comboPopup(chainText);
    if(state.chainKills >= 2){
      pushLog(chainText + ` 報酬 +${reward}`);
    }
    if([3,6,9].includes(state.chainKills)){
      state.overdriveTier = Math.min(3, state.overdriveTier + 1);
      state.overdriveTime = 6 + state.overdriveTier * 1.5;
      pushLog('オーバードライブ発動。全塔の回転が上がります。');
      flash();
    }
    if(state.chainKills >= 4){
      state.particles.push({x:enemy.x,y:enemy.y,r:24,life:0.65,color:'rgba(255,220,120,.55)'});
      flash();
    }
    if(state.chainKills >= 6 && state.chainKills % 3 === 0){
      pushLog('連鎖加速。全塔の火力と報酬倍率が上昇中。');
    }
  }

  function draw(){
    const w = canvas.clientWidth, h = canvas.clientHeight;
    ctx.clearRect(0,0,w,h);
    if(!state) return;

    ctx.fillStyle = '#f8fbff';
    ctx.fillRect(0,0,w,h);
    drawGrid(w,h);
    drawStageBase();
    drawPaths();
    drawPads();
    drawTowers();
    drawEnemies();
    drawProjectiles();
    drawParticles();
    drawComboRibbon();
    drawOverlays();
  }

  function drawGrid(w,h){
    ctx.strokeStyle = 'rgba(74,123,177,.10)';
    ctx.lineWidth = 1;
    for(let x=0;x<w;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
    for(let y=0;y<h;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
  }

  function drawStageBase(){
    const st = state.stage;
    if(st.id === 'element'){
      st.pads.forEach(p => {
        if(!p.shrine) return;
        const map = {ice:'rgba(126,214,255,.22)', arc:'rgba(209,156,255,.20)', prism:'rgba(125,255,180,.18)'};
        ctx.fillStyle = map[p.shrine];
        ctx.beginPath(); ctx.arc(p.x,p.y,34,0,Math.PI*2); ctx.fill();
      });
    }
    if(st.id === 'gems' && st.gemCore){
      ctx.fillStyle = 'rgba(125,255,180,.14)';
      ctx.beginPath(); ctx.arc(st.gemCore.x, st.gemCore.y, st.gemCore.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(83,183,128,.42)';
      ctx.lineWidth = 2; ctx.stroke();
    }
    if(st.id === 'traps' && st.trapZones){
      st.trapZones.forEach(z => {
        ctx.fillStyle = 'rgba(255,190,120,.14)';
        ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'rgba(230,177,63,.38)'; ctx.stroke();
      });
    }
  }

  function drawPaths(){
    state.stage.paths.forEach((path, idx) => {
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.strokeStyle = idx % 2 ? 'rgba(120,177,234,.58)' : 'rgba(103,165,228,.48)';
      ctx.lineWidth = 26;
      ctx.beginPath();
      ctx.moveTo(path[0][0], path[0][1]);
      for(let i=1;i<path.length;i++) ctx.lineTo(path[i][0], path[i][1]);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,.55)'; ctx.lineWidth = 8; ctx.stroke();
      const start = path[0], end = path[path.length-1];
      ctx.fillStyle = '#5d8cff'; ctx.fillRect(start[0]-10,start[1]-10,20,20);
      ctx.fillStyle = '#ff8a8a'; ctx.beginPath(); ctx.arc(end[0],end[1],13,0,Math.PI*2); ctx.fill();
    });
  }

  function drawPads(){
    state.stage.pads.forEach((p, i) => {
      const occupied = state.towers.some(t => t.padIndex === i);
      ctx.fillStyle = occupied ? 'rgba(64,96,128,.09)' : 'rgba(93,140,255,.15)';
      ctx.strokeStyle = occupied ? 'rgba(64,96,128,.22)' : 'rgba(93,140,255,.42)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(p.x,p.y,19,0,Math.PI*2); ctx.fill(); ctx.stroke();
      if(!occupied){
        ctx.beginPath(); ctx.moveTo(p.x-8,p.y); ctx.lineTo(p.x+8,p.y); ctx.moveTo(p.x,p.y-8); ctx.lineTo(p.x,p.y+8); ctx.stroke();
      }
    });
  }

  function drawTowers(){
    state.towers.forEach(t => {
      const def = TOWERS[t.type];
      ctx.fillStyle = def.color;
      ctx.beginPath(); ctx.arc(t.x,t.y,12,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f8fbff';
      ctx.beginPath(); ctx.arc(t.x,t.y,5,0,Math.PI*2); ctx.fill();
      if(t.bonus > 1){
        ctx.strokeStyle = 'rgba(255,230,140,.7)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(t.x,t.y,16,0,Math.PI*2); ctx.stroke();
      }
      if(t.id === state.selectedTowerId){
        ctx.strokeStyle = 'rgba(93,140,255,.9)';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(t.x,t.y,20,0,Math.PI*2); ctx.stroke();
      }
      ctx.fillStyle = '#23405d';
      ctx.font = '700 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('L' + t.level, t.x, t.y + 28);
      ctx.textAlign = 'left';
    });
  }

  function drawEnemies(){
    state.enemies.forEach(e => {
      ctx.fillStyle = e.shocked > 0 ? '#e9bbff' : e.chill ? '#c0f2ff' : e.color;
      const size = e.type === 'boss' ? 18 : e.type === 'titan' ? 14 : e.type === 'brute' ? 11 : 8;
      ctx.beginPath(); ctx.arc(e.x,e.y,size,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(59,89,121,.22)'; ctx.fillRect(e.x-18,e.y-24,36,5);
      ctx.fillStyle = '#7ee09e'; ctx.fillRect(e.x-18,e.y-24,36*clamp(e.hp/e.maxHp,0,1),5);
      if(e.shield > 0){
        ctx.fillStyle = 'rgba(255,239,179,.95)';
        ctx.fillRect(e.x-18,e.y-31,36*clamp(e.shield/(ENEMY_TYPES.boss.hp*0.38),0,1),4);
      }
    });
  }

  function drawProjectiles(){
    state.projectiles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
    });
  }

  function drawParticles(){
    state.particles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0,p.life*2);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    });
  }


  function drawComboRibbon(){
    const meterW = 180;
    const x = canvas.clientWidth - meterW - 18;
    const y = 18;
    ctx.fillStyle = 'rgba(255,255,255,.72)';
    roundRect(x,y,meterW,40,14,true,false);
    ctx.strokeStyle = 'rgba(217,193,104,.55)';
    ctx.lineWidth = 1.5;
    roundRect(x,y,meterW,40,14,false,true);
    ctx.fillStyle = '#6f5730';
    ctx.font = '700 12px sans-serif';
    ctx.fillText('CHAIN DRIVE', x+14, y+16);
    const fill = clamp((state.combo - 1) / 3.8, 0, 1);
    ctx.fillStyle = 'rgba(226,235,245,.95)';
    roundRect(x+12,y+22,meterW-24,10,999,true,false);
    ctx.fillStyle = fill > 0.66 ? '#e6b13f' : fill > 0.33 ? '#8bc7ff' : '#8fd8b2';
    roundRect(x+12,y+22,(meterW-24)*fill,10,999,true,false);
    ctx.fillStyle = '#294666';
    ctx.font = '700 11px sans-serif';
    ctx.fillText(`倍率 x${state.combo.toFixed(1)}  残熱 ${Math.round(state.surge)}`, x+14, y+36);
    if(state.overdriveTime > 0){
      ctx.fillStyle = '#b56f1d';
      ctx.fillText(`OD ${state.overdriveTier}  ${state.overdriveTime.toFixed(1)}s`, x+110, y+16);
    }
  }

  function roundRect(x,y,w,h,r,fill,stroke){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    if(fill) ctx.fill();
    if(stroke) ctx.stroke();
  }

  function drawOverlays(){
    if(state.win || state.lose){
      ctx.fillStyle = 'rgba(238,246,255,.82)'; ctx.fillRect(0,0,canvas.clientWidth,canvas.clientHeight);
      ctx.fillStyle = '#23405d'; ctx.font = '700 34px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(state.win ? '防衛成功' : '防衛失敗', canvas.clientWidth/2, canvas.clientHeight/2 - 10);
      ctx.font = '500 16px sans-serif';
      ctx.fillStyle = '#58718e';
      ctx.fillText(state.win ? '別のステージで別流派の設計も試せます。' : '配置や属性の順番を組み替えて再挑戦してください。', canvas.clientWidth/2, canvas.clientHeight/2 + 24);
      ctx.textAlign = 'left';
    }
  }

  canvas.addEventListener('click', ev => {
    if(!state) return;
    const rect = canvas.getBoundingClientRect();
    const x = ev.clientX - rect.left;
    const y = ev.clientY - rect.top;
    if(selectTowerAt(x,y)) return;
    buildTower(x,y);
  });
  canvas.addEventListener('contextmenu', ev => {
    ev.preventDefault();
    if(!state) return;
    const rect = canvas.getBoundingClientRect();
    sellTower(ev.clientX - rect.left, ev.clientY - rect.top);
  });

  startBtn.onclick = () => {
    if(!state) return;
    if(state.win || state.lose){ loadStage(state.stageId); return; }
    if(!state.started && !state.queue.length && state.enemies.length === 0){
      state.started = true;
      spawnWave();
    } else if(!state.started && (state.queue.length || state.enemies.length)) {
      state.started = true;
      pushLog('戦線を再開します。');
    }
  };
  nextBtn.onclick = () => {
    if(!state) return;
    if(state.win || state.lose){ pushLog('先にステージを再読込してください。'); return; }
    if(state.started || state.enemies.length || state.queue.length){ pushLog('今はまだ次のWaveを始められません。'); return; }
    state.started = true;
    spawnWave();
  };
  resetBtn.onclick = () => { if(state) loadStage(state.stageId); };
  upgradeBtn.onclick = () => upgradeSelectedTower();
  sellBtn.onclick = () => sellSelectedTower();

  function loop(ts){
    const dt = Math.min(0.033, (ts - lastTime) / 1000 || 0.016);
    lastTime = ts;
    update(dt);
    draw();
    animationId = requestAnimationFrame(loop);
  }

  makeStageButtons();
  makeTowerButtons();
  loadStage(STAGES[0].id);
  animationId = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
